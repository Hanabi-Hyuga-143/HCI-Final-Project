<section class="contact-section">
    <div class="contact-info">
        <h2 style="font-size: 3rem; color: white;">Contact <span>Us</span></h2>
        <p>Reach out for wholesale or farm inquiries.</p>
        <div style="margin-top: 20px;">📧 hello@premiumeggs.com</div>
    </div>
    <div class="contact-form-container">
        <form onsubmit="event.preventDefault(); alert('Message Sent!');">
            <div class="form-group"><input type="text" placeholder="Full Name" required></div>
            <div class="form-group"><input type="email" placeholder="Email Address" required></div>
            <div class="form-group"><textarea rows="4" placeholder="How can we help?"></textarea></div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
</section>
