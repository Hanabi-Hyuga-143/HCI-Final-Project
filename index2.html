<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
      <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="products-container">
    <h2 style="text-align:center; margin-bottom: 3rem; font-size: 2.5rem;">Fresh Arrivals</h2>
    <div class="product-grid">
        <div class="product-card">
            <img src="ImageFolder/ChickenEgg.jpg" class="product-image">
            <div class="product-info">
                <h3>Pasture-Raised Eggs</h3>
                <div class="product-price">$5.99</div>
                <button class="add-to-cart-btn" onclick="addItem('Pasture-Raised Eggs', 5.99)">Add to Cart</button>
            </div>
        </div>
        </div>
</section>
<div class="cart-overlay" id="cartOverlay">
        <div class="cart-drawer">
            <h2>Your Cart</h2>
            <div id="cartItems"></div>
            <div class="cart-total">Total: <span id="cartTotal">$0.00</span></div>
            <button class="checkout-btn" onclick="checkout()">Checkout</button>
            <button onclick="toggleCart()" style="background:none; border:none; color:white; cursor:pointer; margin-top:10px;">Close</button>
        </div>
    </div>
</body>
</html>
